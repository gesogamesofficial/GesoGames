<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            transition: filter 1s ease;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 24-7: 呼吸連動パルス（画面全体が呼吸に合わせて明滅） */
        #breath-pulse {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 0;
        }

        /* 24-9: 環境光の変化 */
        #ambient-light {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            transition: background 2s ease;
        }

        /* 24-12: グラデーションシフト */
        #gradient-shift {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            transition: opacity 2s ease;
        }

        /* 24-5: 呼吸ガイド（視覚化） */
        #breath-guide {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 200px; height: 200px;
            border-radius: 50%;
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 1;
            opacity: 0;
            visibility: hidden;
        }

        #breath-guide.active {
            opacity: 1;
            visibility: visible;
        }

        #breath-ring.active {
            opacity: 1;
            visibility: visible;
        }

        #breath-ring.inhale {
            width: 320px; height: 320px;
            border-color: rgba(100,200,255,0.3);
        }

        #breath-ring.hold {
            width: 320px; height: 320px;
            border-color: rgba(255,200,100,0.3);
        }

        #breath-ring.exhale {
            width: 200px; height: 200px;
            border-color: rgba(100,255,150,0.3);
        }

        /* 24-10: 呼吸ガイドの発光 */
        #breath-guide.inhale {
            transform: translate(-50%, -50%) scale(1.3);
            border-color: rgba(100, 200, 255, 0.8);
            box-shadow: 0 0 50px rgba(100, 200, 255, 0.4), inset 0 0 30px rgba(100, 200, 255, 0.1);
        }

        #breath-guide.hold {
            transform: translate(-50%, -50%) scale(1.3);
            border-color: rgba(255, 200, 100, 0.8);
            box-shadow: 0 0 50px rgba(255, 200, 100, 0.4), inset 0 0 30px rgba(255, 200, 100, 0.1);
        }

        #breath-guide.exhale {
            transform: translate(-50%, -50%) scale(0.8);
            border-color: rgba(100, 255, 150, 0.8);
            box-shadow: 0 0 50px rgba(100, 255, 150, 0.4), inset 0 0 30px rgba(100, 255, 150, 0.1);
        }

        #breath-text {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        #breath-count {
            font-size: 48px;
            font-weight: 200;
            margin-top: 10px;
        }

        /* 24-20: 進行の可視化 */
        #progress {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            opacity: 0.5;
            letter-spacing: 2px;
            text-align: center;
            z-index: 1;
        }

        #progress-bar {
            width: 200px; height: 2px;
            background: rgba(255,255,255,0.15);
            margin-top: 8px;
            border-radius: 1px;
            overflow: hidden;
        }

        #progress-fill {
            width: 0%; height: 100%;
            background: rgba(255,255,255,0.5);
            transition: width 1s ease;
        }

        /* 24-21: 科学的情報 */
        #science-info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            opacity: 0.25;
            text-align: center;
            z-index: 1;
        }

        /* カウントダウンタイマー */
        #timer {
            position: absolute;
            bottom: 40px;
            right: 30px;
            font-size: 24px;
            font-weight: 200;
            opacity: 0.3;
            z-index: 1;
        }

        /* 開始画面 */
        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #start-screen h1 {
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 25px;
            letter-spacing: 5px;
        }

        #start-screen p {
            font-size: 15px;

            margin-bottom: 8px;
            max-width: 420px;
            text-align: center;
            line-height: 1.7;
        }

        .preparation-guide {
            margin: 25px 0;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
        }

        .prep-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            padding: 8px 15px;
            background: rgba(255,255,255,0.04);
            border-radius: 5px;
        }

        .prep-icon {
            font-size: 22px;
            margin-right: 15px;
            width: 35px;
            text-align: center;
        }

        .prep-text { font-size: 13px; opacity: 0.85; }
        .prep-text strong { color: #4ecdc4; font-weight: 500; }

        #start-btn {
            margin-top: 35px;
            padding: 15px 60px;
            font-size: 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        #start-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: #fff;
        }

        /* 完了画面 */
        #complete-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #complete-screen.show {
            opacity: 1;
        }

        #complete-screen h2 {
            font-size: 36px;
            font-weight: 200;
            margin-bottom: 15px;
        }

        #complete-screen p {
            font-size: 15px;
            opacity: 0.6;
            margin-bottom: 8px;
        }

        #restart-btn {
            margin-top: 30px;
            padding: 15px 60px;
            font-size: 18px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        #restart-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: #fff;
        }

        #close-btn {
            margin-top: 15px;
            padding: 15px 60px;
            font-size: 18px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }

        #close-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: #fff;
        }

        /* 24-7: パルスアニメーション */
        @keyframes pulse-inhale {
            0%   { opacity: 0; }
            100% { opacity: 0.12; }
        }
        @keyframes pulse-exhale {
            0%   { opacity: 0.12; }
            100% { opacity: 0; }
        }

        /* 24-19: 段階的白黒化で背景色が変わる */
        .gs-1 { filter: saturate(0.85) brightness(1); }
        .gs-2 { filter: saturate(0.70) brightness(0.98); }
        .gs-3 { filter: saturate(0.55) brightness(0.96); }
        .gs-4 { filter: saturate(0.40) brightness(0.94); }
        .gs-5 { filter: saturate(0.25) brightness(0.92); }
        .gs-6 { filter: saturate(0.10) brightness(0.90); }
        .gs-7 { filter: saturate(0) brightness(0.88); }

        /* 24-8: 動的オブジェクト追跡 */
        #tracking-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* カウントダウン */
        #countdown {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        #countdown-num {
            font-size: 120px;
            font-weight: 100;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #countdown-num.show {
            opacity: 1;
        }

        /* フェードアウト */
        #fade-out {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            opacity: 0;
            pointer-events: none;
            z-index: 150;
            transition: opacity 2s ease;
        }

        #fade-out.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="container">

        <div id="start-screen">

            <p>様々な科学的根拠を導入したツールで<br>集中した状態で作業を開始しましょう</p>

            <div class="preparation-guide">

    <script>
        class FocusApp {
            constructor() {
                this.breathPhase = 'inhale';
                this.breathCount = 4;
                this.isActive = false;
                this.grayscaleStep = 0;
                this.breathCycleCount = 0;
                this.breathInterval = null;
                this.timerInterval = null;
                this.endTimeout = null;
                this.audioContext = null;
                this.binauralOsc = null;

                // 24-8: 動的オブジェクト追跡
                this.canvas = document.getElementById('tracking-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.objects = [];
                this.animFrame = null;
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            /* --- 24-8: 複数動体の生成と描画 --- */
            createObjects() {
                this.objects = [];
                const count = 8;
                const w = this.canvas.width;
                const h = this.canvas.height;
                const margin = 50;
                const cols = 4;
                const rows = 2;
                const cellW = (w - margin * 2) / cols;
                const cellH = (h - margin * 2) / rows;

                for (let i = 0; i < count; i++) {
                    const col = i % cols;
                    const row = Math.floor(i / cols);
                    const baseX = margin + col * cellW + cellW / 2;
                    const baseY = margin + row * cellH + cellH / 2;

                    this.objects.push({
                        x: baseX + (Math.random() - 0.5) * cellW * 0.6,
                        y: baseY + (Math.random() - 0.5) * cellH * 0.6,
                        vx: (Math.random() - 0.5) * 3,
                        vy: (Math.random() - 0.5) * 3,
                        size: 6 + Math.random() * 4,
                        hue: 200 + Math.random() * 60,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            animateObjects() {
                if (!this.isActive) return;

                const w = this.canvas.width;
                const h = this.canvas.height;
                const t = Date.now() * 0.001;
                const margin = 50;

                this.ctx.clearRect(0, 0, w, h);

                const sat = 1 - (this.grayscaleStep / 7);

                this.objects.forEach(obj => {
                    // ランダムに方向を変える
                    obj.vx += (Math.random() - 0.5) * 0.3;
                    obj.vy += (Math.random() - 0.5) * 0.3;

                    // 速度制限
                    const maxSpd = 2.5;
                    const spd = Math.sqrt(obj.vx * obj.vx + obj.vy * obj.vy);
                    if (spd > maxSpd) {
                        obj.vx = (obj.vx / spd) * maxSpd;
                        obj.vy = (obj.vy / spd) * maxSpd;
                    }

                    obj.x += obj.vx;
                    obj.y += obj.vy;

                    // 画面端で反射
                    if (obj.x < margin) { obj.x = margin; obj.vx *= -1; }
                    if (obj.x > w - margin) { obj.x = w - margin; obj.vx *= -1; }
                    if (obj.y < margin) { obj.y = margin; obj.vy *= -1; }
                    if (obj.y > h - margin) { obj.y = h - margin; obj.vy *= -1; }

                    // 中央の呼吸ガイドエリアを避ける
                    const cx = w / 2;
                    const cy = h / 2;
                    const distFromCenter = Math.sqrt((obj.x - cx) ** 2 + (obj.y - cy) ** 2);
                    const safeZone = 180;
                    if (distFromCenter < safeZone) {
                        // 中心から離れる方向に力を加える
                        const angle = Math.atan2(obj.y - cy, obj.x - cx);
                        obj.x = cx + Math.cos(angle) * safeZone;
                        obj.y = cy + Math.sin(angle) * safeZone;
                        obj.vx += Math.cos(angle) * 2;
                        obj.vy += Math.sin(angle) * 2;
                    }

                    // グロー
                    const grad = this.ctx.createRadialGradient(obj.x, obj.y, 0, obj.x, obj.y, obj.size * 3);
                    grad.addColorStop(0, `hsla(${obj.hue}, 80%, 70%, ${0.5 * sat})`);
                    grad.addColorStop(1, `hsla(${obj.hue}, 80%, 70%, 0)`);
                    this.ctx.beginPath();
                    this.ctx.arc(obj.x, obj.y, obj.size * 3, 0, Math.PI * 2);
                    this.ctx.fillStyle = grad;
                    this.ctx.fill();

                    // 本体
                    this.ctx.beginPath();
                    this.ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
                    this.ctx.fillStyle = `hsla(${obj.hue}, 80%, 80%, ${0.8 * sat})`;
                    this.ctx.fill();
                });

                this.animFrame = requestAnimationFrame(() => this.animateObjects());
            }

            startObjectTracking() {
                this.createObjects();
                this.animateObjects();
            }

            stopObjectTracking() {
                if (this.animFrame) cancelAnimationFrame(this.animFrame);
                if (this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            }

            start() {
                this.requestFullscreen();

                document.getElementById('start-screen').style.display = 'none';
                const completeScreen = document.getElementById('complete-screen');
                completeScreen.style.display = 'none';
                completeScreen.classList.remove('show');

                this.showCountdown(() => {
                    this.isActive = true;
                    this.shouldEnd = false;
                    this.grayscaleStep = 0;
                    this.breathCycleCount = 0;
                    document.body.style.filter = '';
                    document.body.className = '';
                    document.getElementById('progress-fill').style.width = '0%';
                    document.getElementById('progress-text').textContent = '集中モードへ';
                    document.getElementById('fade-out').classList.remove('active');
                    document.getElementById('fade-out').style.zIndex = '150';

                    this.endTimeout = setTimeout(() => {
                        this.shouldEnd = true;
                    }, 60000);

                    // カウントダウンタイマー
                    this.timeLeft = 60;
                    document.getElementById('timer').textContent = this.timeLeft;
                    this.timerInterval = setInterval(() => {
                        this.timeLeft--;
                        document.getElementById('timer').textContent = this.timeLeft;
                        if (this.timeLeft <= 0) clearInterval(this.timerInterval);
                    }, 1000);

                    this.startBreathCycle();
                    this.startObjectTracking();
                    this.startBinauralBeat();
                    this.updateAmbient(0);
                });
            }

            /* --- 3秒カウントダウン --- */
            showCountdown(callback) {
                const overlay = document.getElementById('countdown');
                const numEl = document.getElementById('countdown-num');
                overlay.style.display = 'flex';

                let count = 3;
                numEl.textContent = count;
                numEl.classList.add('show');

                const interval = setInterval(() => {
                    count--;
                    if (count <= 0) {
                        clearInterval(interval);
                        numEl.classList.remove('show');
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            callback();
                        }, 300);
                    } else {
                        numEl.classList.remove('show');
                        setTimeout(() => {
                            numEl.textContent = count;
                            numEl.classList.add('show');
                        }, 150);
                    }
                }, 1000);
            }

            /* --- 呼吸サイクル --- */
            startBreathCycle() {
                if (!this.isActive) return;

                document.getElementById('breath-guide').classList.add('active');
                document.getElementById('breath-ring').classList.add('active');

                this.breathPhase = 'inhale';
                this.breathCount = 4;
                this.updateBreathGuide();
                this.startPulse('inhale');

                const phases = ['inhale', 'hold', 'exhale'];
                const durations = { inhale: 4, hold: 7, exhale: 8 };
                let idx = 0;

                if (this.breathInterval) clearInterval(this.breathInterval);

                this.breathInterval = setInterval(() => {
                    if (!this.isActive) { clearInterval(this.breathInterval); return; }

                    this.breathCount--;
                    if (this.breathCount <= 0) {
                        idx = (idx + 1) % 3;
                        this.breathPhase = phases[idx];
                        this.breathCount = durations[this.breathPhase];
                        this.startPulse(this.breathPhase);

                        if (this.breathPhase === 'exhale') {
                            this.breathCycleCount++;
                            this.progressGrayscale();

                            // 60秒経過後に吐き切ったら終了
                            if (this.shouldEnd) {
                                this.fadeOutAndEnd();
                            }
                        }
                    }
                    this.updateBreathGuide();
                }, 1000);
            }

            updateBreathGuide() {
                const guide = document.getElementById('breath-guide');
                const ring = document.getElementById('breath-ring');
                const text = document.getElementById('breath-text');
                const count = document.getElementById('breath-count');

                guide.className = 'active ' + this.breathPhase;
                ring.className = 'active ' + this.breathPhase;
                switch (this.breathPhase) {
                    case 'inhale': text.textContent = '吸って'; break;
                    case 'hold':   text.textContent = '止めて';     break;
                    case 'exhale': text.textContent = '吐いて';     break;
                }
                count.textContent = this.breathCount;
            }

            /* --- 24-7: 呼吸連動パルス --- */
            startPulse(phase) {
                const el = document.getElementById('breath-pulse');
                const colors = {
                    inhale: 'rgba(100,200,255,1)',
                    hold:   'rgba(255,200,100,1)',
                    exhale: 'rgba(100,255,150,1)'
                };
                el.style.background = colors[phase];
                el.style.animation = 'none';
                el.offsetHeight;
                el.style.animation = phase === 'inhale'
                    ? 'pulse-inhale 0.5s ease forwards'
                    : 'pulse-exhale 0.5s ease forwards';
            }

            /* --- 24-19: 段階的白黒化 --- */
            progressGrayscale() {
                this.grayscaleStep = Math.min(7, this.grayscaleStep + 1);
                document.body.className = 'gs-' + this.grayscaleStep;

                const pct = Math.round((this.grayscaleStep / 7) * 100);
                document.getElementById('progress-fill').style.width = pct + '%';
                document.getElementById('progress-text').textContent =
                    pct >= 100 ? '集中モード到達' : '中心を見つめてください… ' + (100 - pct) + '%';

                this.updateAmbient(this.grayscaleStep);
            }

            /* --- 24-9,24-12: 環境光・グラデーションシフト --- */
            updateAmbient(step) {
                const amb = document.getElementById('ambient-light');
                const grad = document.getElementById('gradient-shift');
                const t = step / 7;

                const r1 = Math.round(100 + t * 155);
                const g1 = Math.round(200 - t * 100);
                const b1 = Math.round(255 - t * 155);
                amb.style.background = `radial-gradient(ellipse at center, rgba(${r1},${g1},${b1},0.06) 0%, transparent 70%)`;

                const hue = 200 - t * 200;
                grad.style.background = `linear-gradient(135deg, hsla(${hue},60%,50%,0.04) 0%, hsla(${hue + 120},40%,50%,0.02) 50%, transparent 100%)`;
                grad.style.opacity = 1 - t * 0.8;
            }

            /* --- 24-13,24-14: バイノーラルビート --- */
            startBinauralBeat() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const left = this.audioContext.createOscillator();
                    const lG = this.audioContext.createGain();
                    left.frequency.value = 200;
                    lG.gain.value = 0.08;
                    left.connect(lG);
                    lG.connect(this.audioContext.destination);

                    const right = this.audioContext.createOscillator();
                    const rG = this.audioContext.createGain();
                    right.frequency.value = 206;
                    rG.gain.value = 0.08;
                    right.connect(rG);
                    rG.connect(this.audioContext.destination);

                    left.start();
                    right.start();
                    this.binauralOsc = { left, right };
                } catch (e) {}
            }

            stopBinauralBeat() {
                if (this.binauralOsc) {
                    try { this.binauralOsc.left.stop(); this.binauralOsc.right.stop(); } catch (e) {}
                }
            }

            /* --- フェードアウトして終了 --- */
            fadeOutAndEnd() {
                this.isActive = false;
                clearInterval(this.breathInterval);
                this.stopObjectTracking();
                this.stopBinauralBeat();

                document.getElementById('breath-guide').classList.remove('active');
                document.getElementById('breath-ring').classList.remove('active');

                const fadeEl = document.getElementById('fade-out');
                fadeEl.classList.add('active');

                setTimeout(() => {
                    fadeEl.style.zIndex = '50';
                    this.exitFullscreen();
                    const completeScreen = document.getElementById('complete-screen');
                    completeScreen.style.display = 'flex';
                    setTimeout(() => completeScreen.classList.add('show'), 50);
                }, 2000);
            }

            /* --- 終了 --- */
            end() {
                this.isActive = false;
                clearTimeout(this.endTimeout);
                clearInterval(this.timerInterval);
                clearInterval(this.breathInterval);
                this.stopObjectTracking();
                this.stopBinauralBeat();

                document.getElementById('breath-guide').classList.remove('active');
                document.getElementById('breath-ring').classList.remove('active');

                this.exitFullscreen();
                document.getElementById('complete-screen').style.display = 'flex';
            }

            requestFullscreen() {
                const d = document.documentElement;
                if (d.requestFullscreen) d.requestFullscreen();
                else if (d.webkitRequestFullscreen) d.webkitRequestFullscreen();
                else if (d.msRequestFullscreen) d.msRequestFullscreen();
            }

            exitFullscreen() {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            }
        }

        const app = new FocusApp();
        document.getElementById('start-btn').addEventListener('click', () => app.start());
        document.getElementById('restart-btn').addEventListener('click', () => app.start());
        document.getElementById('close-btn').addEventListener('click', () => window.close());
    </script>
</body>
</html>
