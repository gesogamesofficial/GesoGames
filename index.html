<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GesoGames</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            overflow-x: hidden;
        }
        .logo-container {
            max-width: 240px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-container:hover {
            transform: scale(1.02);
        }
        .reveal {
            opacity: 0;
            transform: translateY(10px);
            animation: reveal-anim 1.2s forwards ease-out;
        }
        @keyframes reveal-anim {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        .line-draw {
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: draw 2s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
    
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HSMFYJF513"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-HSMFYJF513');
</script>
    
<body class="flex flex-col min-h-screen">

    <!-- Main Content -->
    <main class="flex-grow flex flex-col items-center justify-center px-6">
        
        <!-- Animated Logo -->
        <div class="logo-container mb-16">
            <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="100" cy="100" r="85" stroke="black" stroke-width="1.5" class="line-draw" />
                <circle cx="100" cy="100" r="78" stroke="black" stroke-width="0.5" class="line-draw" style="animation-delay: 0.3s;" />
                <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="34" fill="black" style="letter-spacing: 0.15em;" class="reveal delay-1">GESO</text>
            </svg>
        </div>

        <!-- Identity Section -->
        <div class="text-center max-w-xl mx-auto">
            <h1 class="text-xs uppercase tracking-[0.5em] text-gray-400 mb-8 reveal delay-2">Game Design Studio</h1>
            <p class="text-xl md:text-2xl font-light leading-relaxed reveal delay-3 px-4">
                体験にコミットする<br>
                GesoGamesは、純粋な思考と直感による<br class="hidden md:block">
                特別なゲーム空間を提供します。
            </p>
        </div>

        <!-- Interaction / Footer Link -->
        <div class="mt-24 flex flex-col items-center reveal" style="animation-delay: 1s;">
            <div class="w-px h-12 bg-gray-200 mb-8"></div>
            <a href="mailto:info@gesogames.example.com" class="text-sm tracking-[0.2em] uppercase border-b border-transparent hover:border-black transition-all pb-1">
                Coming soon...
            </a>
        </div>
    </main>

    <!-- Social / Simple Footer -->
    <footer class="py-12 px-6 flex justify-center space-x-12 reveal" style="animation-delay: 1.2s;">
        <a href="https://www.youtube.com/@GesoGames" target="_blank" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-black transition">Youtube</a>
        <a href="https://x.com/GesoOfficial" target="_blank" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-black transition">X</a>
        <a href="https://www.instagram.com/gesogames.official/?hl=ja" target="_blank" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-black transition">Instaglam</a>
        <span class="text-[10px] uppercase tracking-[0.3em] text-gray-300">© 2026 GesoGames</span>
    </footer>

</body>
</html>
