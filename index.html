<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GesoGames</title>
    <link rel="icon" type="image/png" href="/GesoGames.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #ffffff;
            color: #1a1a1a;
            overflow-x: hidden;
        }
        .logo-container {
            max-width: 240px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .logo-container:hover {
            transform: scale(1.02);
        }
        .reveal {
            opacity: 0;
            transform: translateY(10px);
            animation: reveal-anim 1.2s forwards ease-out;
        }
        @keyframes reveal-anim {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        .line-draw {
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            animation: draw 2s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
    
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HSMFYJF513"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-HSMFYJF513');
</script>
    
<body class="flex flex-col min-h-screen relative">
    {% include header.html %}

    <button id="menu-toggle" class="fixed top-6 right-6 z-50 p-2 flex flex-col justify-center items-center w-8 h-8 space-y-1.5 focus:outline-none" aria-label="メニュー開閉">
        <span id="line1" class="w-6 h-px bg-black transition-transform duration-300"></span>
        <span id="line2" class="w-6 h-px bg-black transition-transform duration-300"></span>
    </button>

    <div id="overlay" class="fixed inset-0 bg-black/5 opacity-0 pointer-events-none transition-opacity duration-300 z-30"></div>

    <aside id="sidebar" class="fixed top-0 left-0 z-40 w-64 h-screen bg-white border-r border-gray-100 flex flex-col justify-between p-8 transition-transform duration-300 -translate-x-full">
        <div class="flex flex-col space-y-12 mt-8">
            <div class="text-xs font-bold tracking-[0.3em] uppercase">GesoGames</div>
            <nav class="flex flex-col space-y-6">
                <a href="https://gesogamesofficial.github.io/GesoGames" class="text-xs uppercase tracking-[0.2em] text-gray-400 hover:text-black transition">Top</a>
                <a href="https://gesogamesofficial.github.io/GesoGames/Accel/top" class="text-xs uppercase tracking-[0.2em] text-gray-400 hover:text-black transition">Accel</a>
                <a href="https://gesogamesofficial.github.io/GesoGames/Shuchu/top" class="text-xs uppercase tracking-[0.2em] text-gray-400 hover:text-black transition">1分集中</a>
            </nav>
        </div>
        <div>
            <span class="text-[9px] uppercase tracking-[0.3em] text-gray-300">© 2026 GesoGames</span>
        </div>
    </aside>

    <main class="flex-grow flex flex-col items-center justify-center px-6">
        
        <div class="logo-container mb-16 reveal delay-1">
            <img src="https://gesogamesofficial.github.io/GesoGames/GesoGames.png" alt="GesoGames" class="w-full h-auto block mx-auto">
        </div>

        <div class="text-center max-w-xl mx-auto">
            <h1 class="text-xs uppercase tracking-[0.5em] text-gray-400 mb-8 reveal delay-2">Game Design Studio</h1>
            <p class="text-xl md:text-2xl font-light leading-relaxed reveal delay-3 px-4">
                <strong>
                    体験にコミットする
                </strong><br>
                GesoGamesは、純粋な思考と直感による<br class="hidden md:block">
                特別なゲーム空間を提供します。
            </p>
        </div>

        <div class="mt-24 flex flex-col items-center reveal" style="animation-delay: 1s;">
            <div class="w-px h-12 bg-gray-200 mb-8"></div>
            <a href="mailto:info@gesogames.example.com" class="text-sm tracking-[0.2em] uppercase border-b border-transparent hover:border-black transition-all pb-1">
                Coming soon...
            </a>
        </div>
    </main>

    <footer class="py-12 px-6 flex justify-center space-x-12 reveal" style="animation-delay: 1.2s;">
        <a href="https://www.youtube.com/@GesoGames" target="_blank" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-black transition">Youtube</a>
        <a href="https://x.com/GesoOfficial" target="_blank" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-black transition">X</a>
        <a href="https://www.instagram.com/gesogames.official/?hl=ja" target="_blank" class="text-[10px] uppercase tracking-[0.3em] text-gray-400 hover:text-black transition">Instagram</a>
    </footer>

    <script>
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const line1 = document.getElementById('line1');
        const line2 = document.getElementById('line2');

        // 開閉処理の関数
        function toggleMenu() {
            const isHidden = sidebar.classList.toggle('-translate-x-full');
            
            if (!isHidden) {
                // オン（表示）のとき
                overlay.classList.remove('opacity-0', 'pointer-events-none');
                overlay.classList.add('opacity-100', 'pointer-events-auto');
            } else {
                // オフ（非表示）のとき
                overlay.classList.remove('opacity-100', 'pointer-events-auto');
                overlay.classList.add('opacity-0', 'pointer-events-none');
            }
            
            // ボタンを「✕」に変形
            line1.classList.toggle('rotate-45');
            line1.classList.toggle('translate-y-[3.5px]');
            line2.classList.toggle('-rotate-45');
            line2.classList.toggle('-translate-y-[3.5px]');
        }

        // ボタンクリック、または背景の暗がり（オーバーレイ）クリックでトグル
        menuToggle.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
    </script>
</body>
</html>
