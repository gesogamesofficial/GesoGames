<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>利用規約への同意 — Quiz Master</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=DM+Mono:wght@400;500&family=Syne:wght@500;700&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #f7f8fa;
  --surface: #ffffff;
  --surface2: #edf0f4;
  --border: rgba(15,23,42,0.08);
  --border2: rgba(15,23,42,0.12);
  --text: #111827;
  --muted: #505763;
  --accent: #2196F3;
  --accent-dim: #6a9de8;
  --r: 12px;
  --r-sm: 8px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Noto Serif JP', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(1rem, 4vw, 2.5rem);
  -webkit-font-smoothing: antialiased;
}

.shell {
  width: 100%;
  max-width: 560px;
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* HEADER */

.hd {
  padding: clamp(1.5rem, 5vw, 2.25rem) clamp(1.25rem, 5vw, 2rem) 1.5rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: var(--r) var(--r) 0 0;
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--accent-dim);
  border: 1px solid rgba(33,150,243,0.18);
  padding: 3px 10px;
  border-radius: 99px;
  margin-bottom: 1rem;
}

.tag-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

.hd h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(1.4rem, 4vw, 1.9rem);
  font-weight: 700;
  line-height: 1.2;
  margin-bottom: 0.5rem;
}

.hd p {
  font-size: clamp(13px, 2.5vw, 14px);
  color: var(--muted);
  line-height: 1.6;
}

/* STEPS */

.steps {
  display: flex;
  align-items: center;
  padding: 1rem clamp(1.25rem, 5vw, 2rem);
  background: var(--surface2);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

.step {
  display: flex;
  align-items: center;
  gap: 7px;
  flex: 1;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.step.done {
  color: var(--accent);
}

.step.active {
  color: var(--text);
}

.step-num {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1px solid currentColor;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  flex-shrink: 0;
}

.step.done .step-num {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.step-line {
  flex: 1;
  height: 1px;
  background: var(--border2);
  margin: 0 6px;
}

/* BODY */

.body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-bottom: none;
  padding: clamp(1.25rem, 5vw, 2rem);
}

.scroll-box {
  height: clamp(200px, 35vw, 260px);
  overflow-y: auto;
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  background: var(--bg);
  padding: clamp(1rem, 3vw, 1.25rem);
}

.scroll-box::-webkit-scrollbar {
  width: 4px;
}

.scroll-box::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 99px;
}

.terms-section {
  margin-bottom: 1.25rem;
}

.terms-section:last-child {
  margin-bottom: 0;
}

.terms-h {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent-dim);
  letter-spacing: 0.08em;
  margin-bottom: 0.5rem;
}

.terms-p {
  font-size: clamp(12px, 2.5vw, 13px);
  color: var(--muted);
  line-height: 1.8;
}

.terms-ul {
  list-style: none;
  margin-top: 0.4rem;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.terms-ul li {
  font-size: clamp(12px, 2.5vw, 13px);
  color: var(--muted);
  line-height: 1.7;
  display: flex;
  gap: 8px;
}

.terms-ul li::before {
  content: '–';
  color: var(--border2);
}

.hint {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(33,150,243,0.06);
  border: 1px solid rgba(33,150,243,0.18);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  margin-top: 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent-dim);
}

.hint-icon {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1px solid var(--accent-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
}

/* FOOTER */

.ft {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 1px solid var(--border2);
  border-radius: 0 0 var(--r) var(--r);
  padding: clamp(1.25rem, 5vw, 2rem);
}

.check-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 1.25rem;
  cursor: pointer;
  position: relative;
  z-index: 0;
}

.check-wrap {
  position: relative;
  flex-shrink: 0;
  margin-top: 2px;
}

.check-input {
  position: absolute;
  opacity: 0;
  width: 20px;
  height: 20px;
  cursor: pointer;
}

.check-box {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border2);
  border-radius: 4px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
}

.check-input:checked ~ .check-box {
  background: var(--accent);
  border-color: var(--accent);
}

.check-mark {
  width: 11px;
  height: 8px;
  border-bottom: 2px solid var(--text);
  border-left: 2px solid var(--text);
  transform: rotate(-45deg) translateY(-1px);
  opacity: 0;
}

.check-input:checked ~ .check-box .check-mark {
  opacity: 1;
}

.check-label strong {
  display: block;
  font-family: 'Syne', sans-serif;
  font-size: clamp(13px, 3vw, 14px);
  margin-bottom: 2px;
}

.check-label small {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

.btn-start {
  width: 100%;
  padding: clamp(14px, 3vw, 16px);
  border: none;
  border-radius: var(--r-sm);
  background: var(--accent);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: clamp(14px, 3vw, 15px);
  font-weight: 700;
  cursor: pointer;
  min-height: 52px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  z-index: 1;
}

.btn-start:disabled {
  background: var(--surface2);
  color: var(--muted);
  cursor: not-allowed;
  border: 1px solid var(--border);
}

.ft-note {
  margin-top: 0.75rem;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* SUCCESS */

.success-view {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(2rem, 8vw, 3.5rem);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  text-align: center;
}

.success-view.show {
  display: flex;
}

.check-anim {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(15,23,42,0.06);
  border: 1px solid rgba(15,23,42,0.14);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.25rem;
}

.success-view h2 {
  font-family: 'Syne', sans-serif;
  margin-bottom: 0.5rem;
}

.success-view p {
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 1.75rem;
}

.btn-go {
  padding: 12px 28px;
  border-radius: var(--r-sm);
  background: var(--accent);
  color: var(--text);
  border: none;
  cursor: pointer;
}

@media (max-width: 420px) {
  body {
    padding: 0;
    align-items: flex-start;
  }

  .hd,
  .ft,
  .success-view {
    border-radius: 0;
  }
}
</style>
</head>

<body>

<div class="shell">

  <!-- MAIN -->
  <div id="mainView">

    <div class="hd">
      <div class="tag">
        <span class="tag-dot"></span>
        Quiz Master
      </div>

      <h1>
        ゲームを始める<br>
        前に
      </h1>

      <p>
        利用規約を確認し、<br>
        同意してからスタートしてください。
      </p>
    </div>

    <div class="steps">

      <div class="step done" id="s1">
        <div class="step-num">✓</div>
        <span>規約を読む</span>
      </div>

      <div class="step-line"></div>

      <div class="step active" id="s2">
        <div class="step-num" id="s2num">2</div>
        <span>同意する</span>
      </div>

      <div class="step-line"></div>

      <div class="step" id="s3">
        <div class="step-num" id="s3num">3</div>
        <span>開始</span>
      </div>

    </div>

    <div class="body">

      <div class="scroll-box">

        <div class="terms-section">
          <p class="terms-h">01 / はじめに</p>
          <p class="terms-p">
            本利用規約は、当クイズゲームの利用条件を定めるものです。
          </p>
        </div>

        <div class="terms-section">
          <p class="terms-h">02 / 禁止事項</p>

          <ul class="terms-ul">
            <li>不正行為</li>
            <li>スコア改ざん</li>
            <li>サーバー攻撃</li>
          </ul>
        </div>

        <div class="terms-section">
          <p class="terms-h">03 / 免責事項</p>

          <p class="terms-p">
            当サービス利用による損害について、運営は責任を負いません。
          </p>
        </div>

        <div class="hint">
          <div class="hint-icon">i</div>
          内容を確認後、同意してください
        </div>

      </div>

    </div>

    <div class="ft">

      <label class="check-row" for="agreeInput">

        <div class="check-wrap">

          <input
            type="checkbox"
            id="agreeInput"
            class="check-input"
          >

          <div class="check-box">
            <div class="check-mark"></div>
          </div>

        </div>

        <div class="check-label">
          <strong>利用規約に同意します</strong>
          <small>内容確認後チェックしてください</small>
        </div>

      </label>

      <button type="button" id="startBtn" class="btn-start" disabled>
        ゲームを開始する →
      </button>

      <p class="ft-note">
        同意しない場合は閉じてください
      </p>

    </div>

  </div>

  <!-- SUCCESS -->

  <div class="success-view" id="successView">

    <div class="check-anim">
      ✓
    </div>

    <h2>同意が完了しました</h2>

    <p>
      ゲームを開始できます。
    </p>

    <button class="btn-go" onclick="location.reload()">
      ゲームへ進む →
    </button>

  </div>

</div>

<script>
const agreeInput = document.getElementById('agreeInput');
const startBtn = document.getElementById('startBtn');

const s2 = document.getElementById('s2');
const s3 = document.getElementById('s3');

const s2num = document.getElementById('s2num');
const s3num = document.getElementById('s3num');

agreeInput.addEventListener('change', () => {

  startBtn.disabled = !agreeInput.checked;

  if (agreeInput.checked) {

    s2.className = 'step done';
    s2num.textContent = '✓';

    s3.className = 'step active';

  } else {

    s2.className = 'step active';
    s2num.textContent = '2';

    s3.className = 'step';
    s3num.textContent = '3';
  }
});

startBtn.addEventListener('click', () => {

  s3.className = 'step done';
  s3num.textContent = '✓';

  document.getElementById('mainView').style.display = 'none';

  document.getElementById('successView').classList.add('show');
});
</script>

</body>
</html>
